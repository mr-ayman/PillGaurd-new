<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillGuard | Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            padding: 30px;
            background: #fff;
            min-height: 100vh;
        }
        
        h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .role-badge {
            text-align: center;
            margin-bottom: 30px;
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }
        
        .role-badge span {
            background: #eff6ff;
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        
        .auth-input:focus {
            border-color: #2563eb;
            background: #fff;
        }
        
        .forgot {
            text-align: right;
            font-size: 12px;
            color: #3b82f6;
            font-weight: 600;
            text-decoration: none;
        }
        
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
        
        .footer-link {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }
        
        .footer-link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
        
        .spinner {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #2563eb;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div id="auth-step">
        <h2>Sign In</h2>
        <div class="role-badge" id="role-label"></div>
        <div class="form-group">
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <a href="#" class="forgot">Forgot password?</a>
            <button class="submit-btn" onclick="handleLogin()">Sign In</button>
        </div>
        <div class="spinner" id="spinner">Signing in…</div>
        <p class="footer-link">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('pillguard_role') || '';
            document.getElementById('role-label').innerHTML = `Signing in as: <span>${role}</span>`;
        });
    </script>
</body>

</html>
