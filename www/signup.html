<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <!-- Your app.js -->
    <script src="app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            padding: 30px;
            background: #fff;
            min-height: 100vh;
        }
        
        h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 40px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .footer-link {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }
        
        .footer-link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div id="auth-step">
        <h2>Register</h2>

        <div class="form-group">
            <input type="text" id="name" class="auth-input" placeholder="Enter your name">
            <input type="email" id="email" class="auth-input" placeholder="Enter your email">
            <input type="password" id="pass" class="auth-input" placeholder="Enter your password">
            <input type="text" id="code" class="auth-input" placeholder="Enter your box code">

            <button class="submit-btn" onclick="handleSignup()">Sign Up</button>
        </div>

        <p class="footer-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>

</body>

</html>
