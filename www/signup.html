<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillGuard | Register</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            padding: 30px;
            background: #fff;
            min-height: 100vh;
        }
        
        h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .role-badge {
            text-align: center;
            margin-bottom: 30px;
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }
        
        .role-badge span {
            background: #eff6ff;
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        
        .auth-input:focus {
            border-color: #2563eb;
            background: #fff;
        }
        
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
        
        .footer-link {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 14px;
        }
        
        .footer-link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
        
        #caretaker-fields,
        #pharmacy-fields {
            display: none;
        }
    </style>
</head>

<body>
    <div id="auth-step">
        <h2>Register</h2>
        <div class="role-badge" id="role-label"></div>
        <div class="form-group">
            <input type="text" id="name" class="auth-input" placeholder="Full Name">
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="pass" class="auth-input" placeholder="Password">

            <!-- Caretaker-only fields -->
            <div id="caretaker-fields">
                <input type="text" id="address" class="auth-input" placeholder="Home Address" style="width:100%">
                <input type="text" id="code" class="auth-input" placeholder="Box Device Code (e.g. A1234)" style="width:100%; margin-top:15px;">
                <textarea id="prescription" class="auth-input" placeholder="Enter prescription (e.g. Paracetamol - Mon,Wed - 2 tablets)"></textarea>
            </div>

            <button class="submit-btn" onclick="handleSignup()">Create Account</button>
        </div>
        <p class="footer-link">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        // Show/hide role-specific fields on load
        window.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('pillguard_role') || '';
            const label = document.getElementById('role-label');
            label.innerHTML = `Signing up as: <span>${role}</span>`;

            if (role === 'Caretaker') {
                document.getElementById('caretaker-fields').style.display = 'flex';
                document.getElementById('caretaker-fields').style.flexDirection = 'column';
                document.getElementById('caretaker-fields').style.gap = '15px';
            }
        });
        window.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("pillguard_role");

            if (!role) {
                alert("Select role first");
                window.location.href = "SelectRole.html";
            }
        });
        window.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("pillguard_role");

            if (!role) {
                alert("Select role first");
                window.location.href = "SelectRole.html";
            }
        });
    </script>
</body>

</html>
