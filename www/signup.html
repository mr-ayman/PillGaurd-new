<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillGuard | Register</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script src="app.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            padding: 30px;
            background: #fff;
            min-height: 100vh;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-input, textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        #caretaker-fields {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="form-group">
    <input type="text" id="name" class="auth-input" placeholder="Full Name">
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="pass" class="auth-input" placeholder="Password">

    <div id="caretaker-fields">
        <input type="text" id="address" class="auth-input" placeholder="Home Address">
        <input type="text" id="code" class="auth-input" placeholder="Device Code">

        <!-- ✅ TEXT PRESCRIPTION -->
        <textarea id="prescriptionText" placeholder="Enter prescription details here..."></textarea>
    </div>

    <button class="submit-btn" onclick="handleSignup()">Create Account</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const role = localStorage.getItem("pillguard_role");

    if (role === "Caretaker") {
        document.getElementById("caretaker-fields").style.display = "flex";
    }
});
</script>

</body>
</html>
