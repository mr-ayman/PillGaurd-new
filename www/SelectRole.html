<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Inter;
            gap: 20px;
        }
        
        button {
            padding: 20px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Select Your Role</h2>

    <button onclick="selectRole('Caretaker')">Caretaker</button>
    <button onclick="selectRole('Pharmacy')">Pharmacy</button>

    <script>
        function selectRole(role) {
            localStorage.setItem("pillguard_role", role);
            window.location.href = "loginsignup.html";
        }
    </script>

</body>

</html>
